# Sign Language Avatar System Configuration

dataset:
  train_csv: "archive/sign_mnist_train/sign_mnist_train.csv"
  test_csv: "archive/sign_mnist_test/sign_mnist_test.csv"

model:
  checkpoint_path: "models/signnet_best.pth"
  word_checkpoint_path: "models/word_signnet_best.pth"
  word_model_type: "statistical_keypoint_mlp"
  num_classes: 24
  dropout_rate: 0.35
  word_frame_count: 24
  word_image_size: 32
  word_confidence_threshold: 0.35
  word_margin_threshold: 0.04
  word_stability_frames: 3

training:
  epochs: 20
  word_epochs: 120
  batch_size: 64
  word_batch_size: 32
  word_cache_videos: true
  word_validate_videos: false
  word_use_bbox: false
  word_split_strategy: "random"
  word_keypoints_dir: "assets/sign_to_text/keypoints_24"
  word_keypoint_workers: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: "ReduceLROnPlateau"
  scheduler_patience: 3
  scheduler_factor: 0.5

augmentation:
  rotation_degrees: 10
  horizontal_flip: true
  brightness_jitter: 0.2
  contrast_jitter: 0.2

inference:
  confidence_threshold: 0.60
  roi_size: 300
  roi_x: null
  roi_y: null
  camera_index: 0
  target_fps: 30
  live_min_word_frames: 10
  live_frame_max_size: 384

avatar:
  signs_dir: "assets/text_to_sign/signs"
  word_videos_dir: "assets/text_to_sign/words"
  sign_to_text_words_dir: "assets/sign_to_text/words"
  sign_to_text_manifest: "assets/sign_to_text/wlasl_top500_balanced4_manifest_fixed.csv"
  min_display_duration_ms: 800
  max_display_duration_ms: 1500
  display_duration_ms: 1000
  space_duration_ms: 400
  no_sign_duration_ms: 800
  image_size: 400
  max_input_chars: 200

logging:
  log_dir: "logs"
  training_log_file: "training_log.csv"
  log_level: "INFO"
